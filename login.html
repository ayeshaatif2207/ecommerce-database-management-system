<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stupify — Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
    <div class="left-nav">
        <div class="logo">Stupify <span>DB</span></div>
    </div>
</nav>

<!-- ===== LOGIN SECTION ===== -->
<div class="login-container">
    <div class="login-card">
        <h1>Login to Stupify</h1>
        <p class="login-subtitle">Select your role and enter credentials</p>

        {% if error %}
        <div class="alert alert-error">
            &#9888; &nbsp;{{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="login-form">
            
            <div class="form-group full">
                <label for="role">Select Role</label>
                <select id="role" name="role" required onchange="updateCredentials()">
                    <option value="">-- Choose a role --</option>
                    <option value="admin">Admin (Full Access)</option>
                    <option value="manager">Manager (View & Add)</option>
                    <option value="analyst">Analyst (Read-Only)</option>
                </select>
                <p class="role-hint" id="role-hint"></p>
            </div>

            <div class="form-group full">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter username"
                    required
                >
            </div>

            <div class="form-group full">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter password"
                    required
                >
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">
                Login &rarr;
            </button>
        </form>

        <div class="credentials-info">
            <h3>Demo Credentials:</h3>
            <ul>
                <li><strong>Admin:</strong> admin_2 / admin_pass123</li>
                <li><strong>Manager:</strong> database_manager / manager_pass_123</li>
                <li><strong>Analyst:</strong> analyst / analyst_pass_123</li>
            </ul>
        </div>
    </div>
</div>

<script>
function updateCredentials() {
    const role = document.getElementById('role').value;
    const hint = document.getElementById('role-hint');
    
    const hints = {
        'admin': '✓ Full access: View, add, update, delete all records',
        'manager': '✓ Manager access: View products, add new ones, update records',
        'analyst': '✓ Analyst access: View-only, generate reports'
    };
    
    hint.textContent = hints[role] || '';
}
</script>

</body>
</html>
